<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Notification</title>
</head>
<body>
  <div class="accent"></div>
  <div class="container">
    <div class="header">
      <span id="title" class="title-text"></span>
      <a id="help-link" class="help-link" style="display:none" target="_blank">
        Need help? &#x2197;
      </a>

      <h2 id="heading"></h2>
      <p id="message"></p>
    </div>
    <div class="footer">
      <span id="countdown" class="countdown"></span>
      <div id="buttons" class="button-group"></div>
    </div>
  </div>
  <script src="main.js"></script>
</body>
</html>
