<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Hermes</title>
</head>
<body>
  <div class="accent"></div>
  <div class="container">
    <div class="header">
      <span id="title" class="title-text"></span>
      <a id="help-link" class="help-link" style="display:none" target="_blank">
        Need help? &#x2197;
      </a>
    </div>
    <div id="carousel" class="carousel" style="display:none">
      <div id="carousel-track" class="carousel-track"></div>
      <div id="carousel-controls" class="carousel-controls" style="display:none">
        <button class="carousel-btn" id="carousel-prev">&larr;</button>
        <span id="carousel-indicator" class="carousel-indicator"></span>
        <button class="carousel-btn" id="carousel-next">&rarr;</button>
      </div>
    </div>
    <div class="content">
      <h2 id="heading"></h2>
      <p id="message"></p>
    </div>
    <div id="watch-status" class="watch-status" style="display:none"></div>
    <div class="footer">
      <span id="countdown" class="countdown"></span>
      <div id="buttons" class="button-group"></div>
    </div>
  </div>
  <script src="main.js"></script>
</body>
</html>
