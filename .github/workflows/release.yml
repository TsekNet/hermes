name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            goos: windows
            goarch: amd64
          - os: macos-latest
            goos: darwin
            goarch: amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Linux deps
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Run unit tests
        if: matrix.goos == 'linux'
        run: go test -v -race -count=1 -tags webkit2_41 ./internal/...

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build with Wails
        shell: bash
        run: |
          BUILD_FLAGS="-platform ${{ matrix.goos }}/${{ matrix.goarch }}"
          BUILD_FLAGS="$BUILD_FLAGS -ldflags \"-s -w -X github.com/TsekNet/hermes/cmd.Version=${{ github.ref_name }} -X github.com/TsekNet/hermes/cmd.BuildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)\""
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BUILD_FLAGS="$BUILD_FLAGS -windowsconsole"
          fi
          if [ "${{ matrix.goos }}" = "linux" ]; then
            BUILD_FLAGS="$BUILD_FLAGS -tags webkit2_41"
          fi
          eval wails build $BUILD_FLAGS

      - name: Package release artifacts
        shell: bash
        run: |
          mkdir -p dist
          if [ "${{ matrix.goos }}" = "darwin" ]; then
            cd build/bin
            tar czf ../../dist/hermes_${{ matrix.goarch }}.app.tar.gz hermes.app
          elif [ "${{ matrix.goos }}" = "windows" ]; then
            cp build/bin/hermes.exe dist/hermes.exe
          elif [ "${{ matrix.goos }}" = "linux" ]; then
            cp build/bin/hermes dist/hermes
            chmod +x dist/hermes
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hermes-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: sha256sum * > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
