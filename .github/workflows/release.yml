name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            goos: windows
            goarch: amd64
          - os: macos-latest
            goos: darwin
            goarch: amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Linux deps
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Run unit tests
        if: matrix.goos == 'linux'
        run: go test -v -race -count=1 -tags webkit2_41 ./internal/...

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build with Wails
        shell: bash
        run: |
          BUILD_FLAGS="-platform ${{ matrix.goos }}/${{ matrix.goarch }}"
          BUILD_FLAGS="$BUILD_FLAGS -ldflags \"-s -w -X github.com/TsekNet/hermes/cmd.Version=${{ github.ref_name }} -X github.com/TsekNet/hermes/cmd.BuildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)\""
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BUILD_FLAGS="$BUILD_FLAGS -windowsconsole"
          fi
          if [ "${{ matrix.goos }}" = "linux" ]; then
            BUILD_FLAGS="$BUILD_FLAGS -tags webkit2_41"
          fi
          eval wails build -skipbindings $BUILD_FLAGS

      - name: Install WiX (Windows)
        if: matrix.goos == 'windows'
        run: |
          dotnet tool install --global wix --version 6.0.2
          wix extension add WixToolset.Util.wixext/6.0.2

      - name: Build MSI (Windows)
        if: matrix.goos == 'windows'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          cp build/windows/msi/hermes-motd.ps1 build/bin/
          cp build/windows/msi/install-motd-hook.ps1 build/bin/
          cp build/windows/msi/remove-motd-hook.ps1 build/bin/
          export PATH="$PATH:$HOME/.dotnet/tools"
          wix build build/windows/msi/hermes.wxs -arch x64 -ext WixToolset.Util.wixext -d Version="$VERSION" -d StagingDir=build/bin -o dist/hermes.msi

      - name: Package release artifacts
        shell: bash
        run: |
          mkdir -p dist
          if [ "${{ matrix.goos }}" = "darwin" ]; then
            cd build/bin
            PKG_ROOT="../../pkgroot"
            mkdir -p "$PKG_ROOT/usr/local/bin" "$PKG_ROOT/Library/LaunchAgents" "$PKG_ROOT/etc/profile.d"
            cp hermes.app/Contents/MacOS/hermes "$PKG_ROOT/usr/local/bin/"
            chmod 755 "$PKG_ROOT/usr/local/bin/hermes"
            printf '%s\n' '<?xml version="1.0" encoding="UTF-8"?>' '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">' '<plist version="1.0">' '<dict>' '  <key>Label</key><string>com.tseknet.hermes</string>' '  <key>ProgramArguments</key>' '  <array><string>/usr/local/bin/hermes</string><string>serve</string></array>' '  <key>RunAtLoad</key><true/>' '  <key>KeepAlive</key><true/>' '</dict>' '</plist>' > "$PKG_ROOT/Library/LaunchAgents/com.tseknet.hermes.plist"
            chmod 644 "$PKG_ROOT/Library/LaunchAgents/com.tseknet.hermes.plist"
            cp ../../build/linux/hermes-motd.sh "$PKG_ROOT/etc/profile.d/hermes-motd.sh"
            chmod 644 "$PKG_ROOT/etc/profile.d/hermes-motd.sh"
            printf '%s\n' '#!/bin/sh' 'set -e' 'launchctl bootout gui/$(id -u) /Library/LaunchAgents/com.tseknet.hermes.plist 2>/dev/null || true' 'rm -f /usr/local/bin/hermes /usr/local/bin/hermes-uninstall' 'rm -f /Library/LaunchAgents/com.tseknet.hermes.plist' 'rm -f /etc/profile.d/hermes-motd.sh' 'ZPROF=/etc/zprofile' 'if [ -f "$ZPROF" ]; then sed -i "" "/hermes-profile\.d/d" "$ZPROF"; fi' 'pkgutil --forget com.tseknet.hermes 2>/dev/null || true' 'echo "Hermes uninstalled."' > "$PKG_ROOT/usr/local/bin/hermes-uninstall"
            chmod 755 "$PKG_ROOT/usr/local/bin/hermes-uninstall"
            mkdir -p ../../pkgscripts
            printf '%s\n' '#!/bin/sh' 'pkill -f "/usr/local/bin/hermes" 2>/dev/null || true' 'exit 0' > ../../pkgscripts/preinstall
            chmod 755 ../../pkgscripts/preinstall
            printf '%s\n' '#!/bin/sh' 'ZPROF=/etc/zprofile' 'MARKER="# hermes-profile.d"' 'SNIPPET="if [ -d /etc/profile.d ]; then for f in /etc/profile.d/*.sh; do [ -r \"\$f\" ] && . \"\$f\"; done; fi $MARKER"' 'if [ ! -f "$ZPROF" ] || ! grep -q "$MARKER" "$ZPROF"; then' '  printf "%s\\n" "$SNIPPET" >> "$ZPROF"' 'fi' 'exit 0' > ../../pkgscripts/postinstall
            chmod 755 ../../pkgscripts/postinstall
            if [ "${{ matrix.goarch }}" = "amd64" ]; then
              pkgbuild --identifier com.tseknet.hermes --root "$PKG_ROOT" --install-location / --scripts ../../pkgscripts ../../dist/hermes.pkg
              tar czf ../../dist/hermes.app.tar.gz hermes.app
            else
              pkgbuild --identifier com.tseknet.hermes --root "$PKG_ROOT" --install-location / --scripts ../../pkgscripts ../../dist/hermes_${{ matrix.goarch }}.pkg
              tar czf ../../dist/hermes_${{ matrix.goarch }}.app.tar.gz hermes.app
            fi
            rm -rf "$PKG_ROOT" ../../pkgscripts
          elif [ "${{ matrix.goos }}" = "windows" ]; then
            :  # hermes.msi already in dist from Build MSI step
          elif [ "${{ matrix.goos }}" = "linux" ]; then
            cp build/bin/hermes dist/hermes
            chmod +x dist/hermes
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hermes-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Build .deb package
        working-directory: dist
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          ARCH=amd64
          PKG=hermes_${VERSION}
          mkdir -p "${PKG}/usr/local/bin" "${PKG}/usr/lib/systemd/user" "${PKG}/etc/profile.d"
          cp -f hermes "${PKG}/usr/local/bin/"
          chmod 755 "${PKG}/usr/local/bin/hermes"
          printf '%s\n' '[Unit]' 'Description=Hermes notification service' '' '[Service]' 'ExecStart=/usr/local/bin/hermes serve' 'Restart=on-failure' '' '[Install]' 'WantedBy=default.target' > "${PKG}/usr/lib/systemd/user/hermes.service"
          printf '%s\n' 'if command -v systemctl >/dev/null 2>&1 && [[ -n "$HOME" ]]; then' '  mkdir -p "$HOME/.config/systemd/user"' '  [[ -f /usr/lib/systemd/user/hermes.service && ! -f "$HOME/.config/systemd/user/hermes.service" ]] && cp /usr/lib/systemd/user/hermes.service "$HOME/.config/systemd/user/"' '  systemctl --user enable --now hermes.service 2>/dev/null || true' 'fi' > "${PKG}/etc/profile.d/hermes.sh"
          cp ../build/linux/hermes-motd.sh "${PKG}/etc/profile.d/hermes-motd.sh"
          chmod 644 "${PKG}/usr/lib/systemd/user/hermes.service" "${PKG}/etc/profile.d/hermes.sh" "${PKG}/etc/profile.d/hermes-motd.sh"
          mkdir -p "${PKG}/DEBIAN"
          printf 'Package: hermes\nVersion: %s\nArchitecture: %s\nMaintainer: Hermes <admin@tseknet.com>\nDescription: Cross-platform notification daemon (per-user gRPC + Wails UI)\n' "$VERSION" "$ARCH" > "${PKG}/DEBIAN/control"
          printf '%s\n' '#!/bin/sh' 'set -e' 'pkill -f /usr/local/bin/hermes 2>/dev/null || true' 'for uid_dir in /run/user/*; do' '  uid=$(basename "$uid_dir")' '  DBUS_SESSION_BUS_ADDRESS="unix:path=$uid_dir/bus" sudo -u "#$uid" systemctl --user disable --now hermes.service 2>/dev/null || true' 'done' > "${PKG}/DEBIAN/prerm"
          chmod 755 "${PKG}/DEBIAN/prerm"
          printf '%s\n' '#!/bin/sh' 'set -e' 'if [ "$1" = "purge" ] || [ "$1" = "remove" ]; then' '  rm -f /etc/profile.d/hermes.sh /etc/profile.d/hermes-motd.sh' '  rm -f /usr/lib/systemd/user/hermes.service' '  for home_dir in /home/*; do' '    rm -f "$home_dir/.config/systemd/user/hermes.service" 2>/dev/null || true' '  done' 'fi' > "${PKG}/DEBIAN/postrm"
          chmod 755 "${PKG}/DEBIAN/postrm"
          dpkg-deb --root-owner-group -b "${PKG}" "hermes_${VERSION}.deb"
          cp "hermes_${VERSION}.deb" hermes.deb
          rm -rf "${PKG}"

      - name: Generate checksums
        working-directory: dist
        run: sha256sum * > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/hermes.app.tar.gz
            dist/hermes_arm64.app.tar.gz
            dist/hermes.deb
            dist/hermes.msi
          generate_release_notes: true
